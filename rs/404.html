<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Página Não Encontrada | RS Soluções</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  
  <!-- Font Awesome para Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111111;
      color: #E8E8E8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    
    .error-container {
      max-width: 600px;
      padding: 40px;
      background-color: #222222;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }
    
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }
    
    .error-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 16px;
    }
    
    .error-message {
      font-size: 0.95rem;
      font-weight: 300;
      color: #555555;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background-color: #FFFFFF;
      color: #111111;
      border: none;
    }
    
    .btn:hover {
      background-color: #E8E8E8;
      transform: translateY(-3px);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }
    
    .btn i {
      margin-right: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Página Não Encontrada</h1>
    <p class="error-message">Desculpe, a página que você está procurando não existe, foi removida ou está temporariamente indisponível. Utilize o botão abaixo para retornar à página inicial.</p>
    <a href="index.html" class="btn"><i class="fa-solid fa-house"></i> Voltar ao Início</a>
  </div>

</body>
</html>
